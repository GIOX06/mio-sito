<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuratore Menu Medievale - Zecchini Autentici</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #5c1d1d;
            --bg-panel: #fdfbf7;
            --border-color: #d4a373;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #ebdcb9;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        #mobile-tabs {
            display: none;
            width: 100%;
            max-width: 560px;
            margin-bottom: 15px;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid var(--primary-color);
            background-color: transparent;
            color: var(--primary-color);
            border-radius: 8px;
            cursor: pointer;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        #main-container {
            display: flex;
            flex-direction: row; 
            gap: 35px;
            width: 100%;
            max-width: 1350px;
            align-items: flex-start;
            justify-content: center;
        }

        #control-panel {
            flex: 1;
            max-width: 720px;
            background: var(--bg-panel);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            height: fit-content;
            user-select: auto;
        }

        #preview-workspace {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            position: relative;
        }

        .page-scale-wrapper {
            width: 560px;
            height: 685px;
            flex-shrink: 0;
        }

        .menu-page-block {
            width: 560px;
            height: 685px;
            position: relative;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            transform-origin: top left;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .menu-overlay-container {
            position: absolute;
            left: 15%;
            width: 70%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
        }

        #anchor-mastro-birraio     { top: 38.0%; }
        #anchor-condottiero        { top: 51.5%; }
        #anchor-viandante          { top: 62.5%; }
        #anchor-castellano         { top: 72.8%; }
        #anchor-piccolo-cavaliere  { top: 82.5%; }

        .menu-text-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            text-align: center;
            pointer-events: none;
        }

        .inspectable-box {
            width: 100%;
            color: #1c0e00;
            font-family: 'EB Garamond', 'Georgia', serif;
            transition: transform 0.05s ease;
            white-space: pre-line;
            word-wrap: break-word;
            cursor: move;
            pointer-events: auto;
            touch-action: none;
        }

        .item-name-box {
            font-weight: bold;
            letter-spacing: 0.3px;
            line-height: 1.2em;
        }

        .item-desc-box {
            font-style: italic;
            color: #3d250d;
            line-height: 1.2em;
            margin-top: 2px;
        }

        /* STILE DELLA MONETA REALE */
        .item-price-box {
            position: absolute;
            left: 0; 
            top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            width: 48px; /* Dimensione ottimale per coprire i vecchi cerchietti */
            height: 48px;
            
            /* Puntamento al file zecchino-medievale.png */
            background-image: url('zecchino-medievale.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.5));
            
            /* Stile del numero sopra la moneta */
            color: #1a0800; 
            font-weight: 800;
            font-family: 'EB Garamond', serif;
            /* Forte contorno per renderlo leggibile sulle venature dell'oro */
            text-shadow: 
                -1.5px -1.5px 0 #fff8d6,  
                 1.5px -1.5px 0 #fff8d6,
                -1.5px  1.5px 0 #fff8d6,
                 1.5px  1.5px 0 #fff8d6;
            cursor: move;
            touch-action: none;
        }

        #debug-tooltip {
            position: fixed;
            z-index: 9999;
            background: rgba(28, 14, 0, 0.95);
            color: #ebdcb9;
            padding: 6px 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            pointer-events: none;
            display: none;
        }

        .inspect-highlight {
            outline: 2px dashed #3498db !important;
            background-color: rgba(52, 152, 219, 0.1) !important;
        }
        
        tr.inspect-highlight td {
            background-color: rgba(52, 152, 219, 0.12) !important;
        }

        h2 { color: var(--primary-color); margin-bottom: 15px; font-size: 1.2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 5px;}
        .file-inputs { margin-bottom: 15px; }
        .file-box { background: #fff; border: 1px dashed var(--border-color); padding: 12px; text-align: center; font-size: 13px; cursor: pointer; border-radius: 6px; }
        .file-box.has-image { background: #e8f5e9; border: 1px solid #27ae60; }
        .file-box input { display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; background: white; font-size: 12px; }
        th, td { padding: 10px 8px; border: 1px solid #e0e0e0; text-align: left; vertical-align: top; }
        th { background-color: var(--primary-color); color: white; text-transform: uppercase; font-size: 11px; }
        
        input[type="text"], textarea { width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 6px; font-family: inherit; }
        textarea { resize: vertical; height: 48px; font-size: 12px; }
        
        .typo-controls-block {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 8px;
            background: #f7f2e8;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #eadecc;
        }

        .control-row-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border-bottom: 1px dashed rgba(212, 163, 115, 0.4);
            padding-bottom: 4px;
        }
        .control-row-item:last-child { border-bottom: none; padding-bottom: 0; }

        .control-row-item span.label-target {
            font-size: 11px;
            font-weight: bold;
            color: #444;
            min-width: 60px;
        }

        .micro-controls {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .btn-micro {
            background: #f0e6d2;
            border: 1px solid var(--border-color);
            color: #5c1d1d;
            padding: 2px 5px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-micro:hover { background: #e4d5b7; }
        .lbl-micro-status { font-size: 10px; color: #666; font-family: monospace; min-width: 105px; text-align: right; }

        .btn-container { display: flex; flex-direction: column; gap: 10px; }
        .btn-download { background-color: #27ae60; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; box-shadow: 0 4px 10px rgba(39,174,96,0.2); }
        .btn-reset { background-color: #c0392b; color: white; padding: 6px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; margin-top: 15px; width: 100%; opacity: 0.8; }

        @media (min-width: 769px) and (max-width: 1180px) {
            #main-container { gap: 15px; }
            #preview-workspace { --pc-scale: calc((100vw - 760px) / 560); }
            .page-scale-wrapper { width: calc(560px * var(--pc-scale)); height: calc(685px * var(--pc-scale)); }
            .menu-page-block { transform: scale(var(--pc-scale)); }
        }

        @media (max-width: 768px) {
            body { padding: 15px 10px; }
            #mobile-tabs { display: flex; }
            #main-container { flex-direction: column; align-items: center; gap: 0; width: 100%; }
            #preview-workspace { display: none; width: 100%; }
            #control-panel { max-width: 100%; width: 100%; padding: 15px; display: block; }
            table { font-size: 11px; }
            th, td { padding: 5px; }
            .page-scale-wrapper {
                --mobile-scale: calc((100vw - 20px) / 560); 
                width: calc(100vw - 20px);
                height: calc(685px * var(--mobile-scale)); 
                max-width: 560px;
                max-height: 685px;
            }
            .menu-page-block { transform: scale(calc((100vw - 20px) / 560)); max-width: 560px; }
        }
    </style>
</head>
<body>

    <div id="debug-tooltip"></div>

    <div id="mobile-tabs">
        <button id="btn-tab-edit" class="tab-btn active" onclick="switchMobileTab('edit')">✍️ Modifica Menu</button>
        <button id="btn-tab-view" class="tab-btn" onclick="switchMobileTab('view')">👁️ Vedi Anteprima</button>
    </div>

    <div id="main-container">

        <div id="control-panel">
            <h2>Impostazioni Grafica di Sfondo</h2>
            <div class="file-inputs">
                <div class="file-box" id="box-lbl-bg1">
                    <label for="bg1" id="lbl-bg1">🖼️ Sfondo Predefinito Attivo (menu_bg.png)</label>
                    <input type="file" id="bg1" accept="image/*" onchange="processAndSaveBg(this, 'page-menu', 'db_single_bg', 'box-lbl-bg1')">
                </div>
            </div>

            <h2>Gestione Piatti (Trascina gli zecchini reali nell'anteprima!)</h2>
            <table id="editor-table">
                <thead>
                    <tr>
                        <th style="width: 30px;">Usa</th>
                        <th>Dati Piatto & Regolazioni Spaziali</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <div class="btn-container">
                <button class="btn-download" onclick="downloadPageAsPNG('page-menu', 'Menu_Zecchini_Finale.png')">📸 Scarica Menu Completo (PNG)</button>
            </div>
            
            <button class="btn-reset" onclick="resetToDefault()">🔄 Inizializza Tutto a Predefinito</button>
        </div>

        <div id="preview-workspace">
            <div class="page-scale-wrapper">
                <div id="page-menu" class="menu-page-block">
                    <div id="anchor-mastro-birraio" class="menu-overlay-container"></div>
                    <div id="anchor-condottiero" class="menu-overlay-container"></div>
                    <div id="anchor-viandante" class="menu-overlay-container"></div>
                    <div id="anchor-castellano" class="menu-overlay-container"></div>
                    <div id="anchor-piccolo-cavaliere" class="menu-overlay-container"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const DEFAULT_BG_PATH = "menu_bg.png"; 
        const DB_KEY = "db_menu_medievale_v12_perfectcoin";

        // Coordinazione iniziale ottimizzata basata sulle posizioni dei cerchi originali
        const defaultDataset = [
            { id: 1, active: true, cat: "mastro-birraio", catName: "Mastro Birraio", name: "Birra del Borgo", price: "6", desc: "Artigianale rossa prodotta con\ngrani locali e luppoli selvatici.", nameFontDelta: 0, nameOffsetTop: 0, nameOffsetLeft: 0, descFontDelta: 0, descOffsetTop: 0, descOffsetLeft: 0, priceFontDelta: 2, priceOffsetTop: -2, priceOffsetLeft: -54 },
            { id: 2, active: true, cat: "condottiero", catName: "Condottiero", name: "Pappardelle al Cinghiale", price: "10", desc: "Pasta fresca all'uovo con\nragù bianco di cinghiale locale.", nameFontDelta: 0, nameOffsetTop: 0, nameOffsetLeft: 0, descFontDelta: 0, descOffsetTop: 0, descOffsetLeft: 0, priceFontDelta: 2, priceOffsetTop: -12, priceOffsetLeft: 236 },
            { id: 3, active: true, cat: "viandante", catName: "Viandante", name: "Zuppa di Farro e Castagne", price: "9", desc: "Antica ricetta medievale con\nlegumi, farro e castagne.", nameFontDelta: 0, nameOffsetTop: 0, nameOffsetLeft: 0, descFontDelta: 0, descOffsetTop: 0, descOffsetLeft: 0, priceFontDelta: 2, priceOffsetTop: -2, priceOffsetLeft: -54 },
            { id: 4, active: true, cat: "castellano", catName: "Castellano", name: "Ravioli ai Funghi Porcini", price: "11", desc: "Pasta ripiena saltata con porcini\ne scaglie di pecorino.", nameFontDelta: 0, nameOffsetTop: 0, nameOffsetLeft: 0, descFontDelta: 0, descOffsetTop: 0, descOffsetLeft: 0, priceFontDelta: 2, priceOffsetTop: -12, priceOffsetLeft: 236 },
            { id: 5, active: true, cat: "piccolo-cavaliere", catName: "Piccolo Cavaliere", name: "Gnocchetti al Pomodoro", price: "7", desc: "Porzione ridotta con passata\ndi pomodoro dolce e parmigiano.", nameFontDelta: 0, nameOffsetTop: 0, nameOffsetLeft: 0, descFontDelta: 0, descOffsetTop: 0, descOffsetLeft: 0, priceFontDelta: 2, priceOffsetTop: -2, priceOffsetLeft: -54 }
        ];

        let menuDataset = [];

        let isDragging = false;
        let dragTarget = null;
        let dragItemId = null;
        let dragFieldType = null; 
        let startPointerX = 0;
        let startPointerY = 0;
        let startOffsetX = 0;
        let startOffsetY = 0;

        function switchMobileTab(targetTab) {
            const panel = document.getElementById('control-panel');
            const preview = document.getElementById('preview-workspace');
            const btnEdit = document.getElementById('btn-tab-edit');
            const btnView = document.getElementById('btn-tab-view');
            if (targetTab === 'edit') {
                panel.style.display = 'block'; preview.style.display = 'none';
                btnEdit.classList.add('active'); btnView.classList.remove('active');
            } else {
                panel.style.display = 'none'; preview.style.display = 'flex';
                btnEdit.classList.remove('active'); btnView.classList.add('active');
            }
        }

        function initDatabase() {
            const savedData = localStorage.getItem(DB_KEY);
            if (savedData) {
                try { menuDataset = JSON.parse(savedData); } catch(e) { menuDataset = JSON.parse(JSON.stringify(defaultDataset)); }
            } else {
                menuDataset = JSON.parse(JSON.stringify(defaultDataset));
                localStorage.setItem(DB_KEY, JSON.stringify(menuDataset));
            }
        }

        function loadBackground() {
            const savedBg = localStorage.getItem('db_single_bg');
            const menuElement = document.getElementById('page-menu');
            if (savedBg) { menuElement.style.backgroundImage = `url('${savedBg}')`; setLabelUploaded(); } 
            else { menuElement.style.backgroundImage = `url('${DEFAULT_BG_PATH}')`; }
        }

        function setLabelUploaded() {
            const box = document.getElementById('box-lbl-bg1');
            if (box) { box.classList.add('has-image'); box.querySelector('label').innerText = "✅ Sfondo Personalizzato Caricato"; }
        }

        function processAndSaveBg(input, targetId, storageKey, labelBoxId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    localStorage.setItem(storageKey, e.target.result);
                    document.getElementById(targetId).style.backgroundImage = `url('${e.target.result}')`;
                    setLabelUploaded();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function buildEditorTable() {
            const tbody = document.querySelector("#editor-table tbody");
            tbody.innerHTML = menuDataset.map(item => `
                <tr id="editor-row-${item.id}" data-target-group="anchor-${item.cat}">
                    <td style="text-align:center; vertical-align: middle;">
                        <input type="checkbox" ${item.active ? 'checked' : ''} id="active-${item.id}" onchange="syncDataAndRender()">
                    </td>
                    <td>
                        <b style="color:var(--primary-color); font-size:10px; display:block; margin-bottom: 2px;">PORTATA: ${item.catName.toUpperCase()}</b>
                        <div style="display: flex; gap: 8px; margin-bottom: 4px;">
                            <textarea id="name-${item.id}" oninput="syncDataAndRender()" style="flex: 2; font-weight:bold; height:36px;">${item.name}</textarea>
                            <input type="text" id="price-${item.id}" value="${item.price}" oninput="syncDataAndRender()" style="flex: 0 0 75px; text-align:right; font-weight:bold; height:36px;">
                        </div>
                        <textarea id="desc-${item.id}" oninput="syncDataAndRender()">${item.desc}</textarea>
                        
                        <div class="typo-controls-block">
                            <div class="control-row-item" data-subbox-target="box-${item.cat}-price">
                                <span class="label-target">Zecchino Oro:</span>
                                <div class="micro-controls">
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'price', 'font', -0.5)">A-</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'price', 'font', 0.5)">A+</button>
                                </div>
                                <span id="status-price-${item.id}" class="lbl-micro-status">pt | X:${item.priceOffsetLeft}px Y:${item.priceOffsetTop}px</span>
                            </div>
                            <div class="control-row-item" data-subbox-target="box-${item.cat}-name">
                                <span class="label-target">Testo Nome:</span>
                                <div class="micro-controls">
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'name', 'font', -0.5)">A-</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'name', 'font', 0.5)">A+</button>
                                </div>
                                <span id="status-name-${item.id}" class="lbl-micro-status">pt | X:${item.nameOffsetLeft}px Y:${item.nameOffsetTop}px</span>
                            </div>
                            <div class="control-row-item" data-subbox-target="box-${item.cat}-desc">
                                <span class="label-target">Testo Desc:</span>
                                <div class="micro-controls">
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'desc', 'font', -0.5)">A-</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'desc', 'font', 0.5)">A+</button>
                                </div>
                                <span id="status-desc-${item.id}" class="lbl-micro-status">pt | X:${item.descOffsetLeft}px Y:${item.descOffsetTop}px</span>
                            </div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function adjustVectorTypography(id, targetBox, axis, amount) {
            const item = menuDataset.find(x => x.id === id);
            if (!item) return;
            if (axis === 'font') {
                if (targetBox === 'name') item.nameFontDelta = parseFloat((item.nameFontDelta + amount).toFixed(1));
                if (targetBox === 'desc') item.descFontDelta = parseFloat((item.descFontDelta + amount).toFixed(1));
                if (targetBox === 'price') item.priceFontDelta = parseFloat((item.priceFontDelta + amount).toFixed(1));
            }
            localStorage.setItem(DB_KEY, JSON.stringify(menuDataset));
            renderGraphics();
            updateStatusLabels(item);
        }

        function updateStatusLabels(item) {
            document.getElementById(`status-name-${item.id}`).innerText = `${item.nameFontDelta >= 0 ? '+' : ''}${item.nameFontDelta}pt | X:${item.nameOffsetLeft}px Y:${item.nameOffsetTop}px`;
            document.getElementById(`status-desc-${item.id}`).innerText = `${item.descFontDelta >= 0 ? '+' : ''}${item.descFontDelta}pt | X:${item.descOffsetLeft}px Y:${item.descOffsetTop}px`;
            document.getElementById(`status-price-${item.id}`).innerText = `${item.priceFontDelta >= 0 ? '+' : ''}${item.priceFontDelta}pt | X:${item.priceOffsetLeft}px Y:${item.priceOffsetTop}px`;
        }

        function syncDataAndRender() {
            menuDataset.forEach(item => {
                item.name = document.getElementById(`name-${item.id}`).value;
                item.price = document.getElementById(`price-${item.id}`).value;
                item.desc = document.getElementById(`desc-${item.id}`).value;
                item.active = document.getElementById(`active-${item.id}`).checked;
            });
            localStorage.setItem(DB_KEY, JSON.stringify(menuDataset));
            renderGraphics();
        }

        function renderGraphics() {
            const categories = ['mastro-birraio', 'condottiero', 'viandante', 'castellano', 'piccolo-cavaliere'];
            categories.forEach(c => { const a = document.getElementById(`anchor-${c}`); if (a) a.innerHTML = ''; });

            menuDataset.forEach(item => {
                if (item.active) {
                    const anchor = document.getElementById(`anchor-${item.cat}`);
                    if (anchor) {
                        // Moneta Zecchino PNG
                        if (item.price) {
                            const priceBox = document.createElement('div');
                            priceBox.id = `box-${item.cat}-price`;
                            priceBox.className = 'item-price-box'; 
                            priceBox.style.fontSize = `${14 + item.priceFontDelta}px`;
                            priceBox.style.transform = `translate(${item.priceOffsetLeft}px, ${item.priceOffsetTop}px)`;
                            priceBox.textContent = item.price;
                            
                            priceBox.addEventListener('pointerdown', (e) => setupDragStart(e, item.id, 'price'));
                            anchor.appendChild(priceBox);
                        }

                        // Testi Centrati
                        const textBlock = document.createElement('div');
                        textBlock.className = 'menu-text-block';

                        const nameBox = document.createElement('div');
                        nameBox.id = `box-${item.cat}-name`;
                        nameBox.className = 'inspectable-box item-name-box';
                        nameBox.style.fontSize = `${13.5 + item.nameFontDelta}px`;
                        nameBox.style.transform = `translate(${item.nameOffsetLeft}px, ${item.nameOffsetTop}px)`;
                        nameBox.textContent = item.name;
                        nameBox.addEventListener('pointerdown', (e) => setupDragStart(e, item.id, 'name'));
                        
                        const descBox = document.createElement('div');
                        descBox.id = `box-${item.cat}-desc`;
                        descBox.className = 'inspectable-box item-desc-box';
                        descBox.style.fontSize = `${11.5 + item.descFontDelta}px`;
                        descBox.style.transform = `translate(${item.descOffsetLeft}px, ${item.descOffsetTop}px)`;
                        descBox.textContent = item.desc; 
                        descBox.addEventListener('pointerdown', (e) => setupDragStart(e, item.id, 'desc'));

                        textBlock.appendChild(nameBox);
                        textBlock.appendChild(descBox);
                        anchor.appendChild(textBlock);
                    }
                }
            });
        }

        function setupDragStart(e, id, field) {
            if (e.button !== 0 && e.pointerType === 'mouse') return;
            
            isDragging = true;
            dragTarget = e.currentTarget;
            dragItemId = id;
            dragFieldType = field;
            
            dragTarget.setPointerCapture(e.pointerId);
            
            const item = menuDataset.find(x => x.id === id);
            if (!item) return;
            
            startPointerX = e.clientX;
            startPointerY = e.clientY;
            
            if (field === 'name') { startOffsetX = item.nameOffsetLeft; startOffsetY = item.nameOffsetTop; }
            if (field === 'desc') { startOffsetX = item.descOffsetLeft; startOffsetY = item.descOffsetTop; }
            if (field === 'price') { startOffsetX = item.priceOffsetLeft; startOffsetY = item.priceOffsetTop; }
            
            e.stopPropagation();
            clearAllHighlights();
        }

        window.addEventListener('pointermove', (e) => {
            if (!isDragging || !dragTarget) return;
            
            const wrapper = document.querySelector('.menu-page-block');
            let scale = 1;
            if (wrapper) {
                const transformMatrix = window.getComputedStyle(wrapper).transform;
                if (transformMatrix && transformMatrix !== 'none') {
                    const values = transformMatrix.split('(')[1].split(')')[0].split(',');
                    scale = parseFloat(values[0]);
                }
            }

            const deltaX = (e.clientX - startPointerX) / scale;
            const deltaY = (e.clientY - startPointerY) / scale;
            
            const currentX = Math.round(startOffsetX + deltaX);
            const currentY = Math.round(startOffsetY + deltaY);
            
            dragTarget.style.transform = `translate(${currentX}px, ${currentY}px)`;
            
            const item = menuDataset.find(x => x.id === dragItemId);
            if (item) {
                if (dragFieldType === 'name') { item.nameOffsetLeft = currentX; item.nameOffsetTop = currentY; }
                if (dragFieldType === 'desc') { item.descOffsetLeft = currentX; item.descOffsetTop = currentY; }
                if (dragFieldType === 'price') { item.priceOffsetLeft = currentX; item.priceOffsetTop = currentY; }
                updateStatusLabels(item);
            }
        });

        window.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            if (dragTarget) dragTarget.releasePointerCapture(e.pointerId);
            isDragging = false;
            dragTarget = null;
            localStorage.setItem(DB_KEY, JSON.stringify(menuDataset));
        });

        const workspace = document.getElementById('preview-workspace');
        const controlPanel = document.getElementById('control-panel');
        const tooltip = document.getElementById('debug-tooltip');
        let activeElementsRegistry = [];

        function moveAndShowTooltip(e, label) {
            if (isDragging) return;
            tooltip.style.display = 'block';
            tooltip.innerText = label;
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
        }

        function clearAllHighlights() {
            tooltip.style.display = 'none';
            activeElementsRegistry.forEach(el => { if (el) el.classList.remove('inspect-highlight'); });
            activeElementsRegistry = [];
        }

        workspace.addEventListener('mousemove', (e) => {
            if (isDragging) { clearAllHighlights(); return; }
            clearAllHighlights();
            const targetNode = e.target.closest('.item-name-box, .item-desc-box, .item-price-box, .menu-page-block');
            
            if (targetNode) {
                targetNode.classList.add('inspect-highlight');
                activeElementsRegistry.push(targetNode);

                if (targetNode.id) {
                    const idString = targetNode.id;
                    moveAndShowTooltip(e, `Trascina per muovere -> #${idString}`);
                    const match = idString.match(/box-(.+)-(name|desc|price)/);
                    if (match) {
                        const cat = match[1];
                        const row = controlPanel.querySelector(`tr[data-target-group="anchor-${cat}"]`);
                        if (row) { row.classList.add('inspect-highlight'); activeElementsRegistry.push(row); }
                    }
                }
            }
        });

        workspace.addEventListener('mouseleave', clearAllHighlights);

        function downloadPageAsPNG(elementId, filename) {
            clearAllHighlights();
            const preview = document.getElementById('preview-workspace');
            const originalDisplay = window.getComputedStyle(preview).display;
            if (originalDisplay === 'none') preview.style.display = 'flex';

            html2canvas(document.getElementById(elementId), {
                scale: 3, useCORS: true, allowTaint: false, logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = filename;
                link.href = canvas.toDataURL('image/png');
                link.click();
                if (originalDisplay === 'none') preview.style.display = 'none';
            });
        }

        function resetToDefault() {
            if (confirm("Resettare la configurazione e tornare allo sfondo predefinito?")) {
                localStorage.clear(); window.location.reload();
            }
        }

        initDatabase();
        buildEditorTable();
        loadBackground();
        renderGraphics();
        menuDataset.forEach(item => updateStatusLabels(item));
    </script>
</body>
</html>
