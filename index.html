<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuratore Menu Medievale - Controllo Spaziale 2D Totale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #5c1d1d;
            --bg-panel: #fdfbf7;
            --border-color: #d4a373;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #ebdcb9;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #mobile-tabs {
            display: none;
            width: 100%;
            max-width: 560px;
            margin-bottom: 15px;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid var(--primary-color);
            background-color: transparent;
            color: var(--primary-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        #main-container {
            display: flex;
            flex-direction: row; 
            gap: 35px;
            width: 100%;
            max-width: 1350px;
            align-items: flex-start;
            justify-content: center;
        }

        #control-panel {
            flex: 1;
            max-width: 720px;
            background: var(--bg-panel);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            height: fit-content;
        }

        #preview-workspace {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            position: relative;
        }

        .page-scale-wrapper {
            width: 560px;
            height: 685px;
            flex-shrink: 0;
        }

        .menu-page-block {
            width: 560px;
            height: 685px;
            position: relative;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            transform-origin: top left;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        #menu-title-container {
            position: absolute;
            top: 28%;
            left: 20%;
            width: 60%;
            text-align: center;
            font-family: 'EB Garamond', 'Georgia', serif;
            color: #1c0e00;
        }

        .main-menu-title {
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(92, 29, 29, 0.3);
            padding-bottom: 4px;
        }

        .menu-overlay-container {
            position: absolute;
            left: 15%;
            width: 70%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #anchor-mastro-birraio     { top: 41.7%; }
        #anchor-condottiero        { top: 54.7%; }
        #anchor-viandante          { top: 65.3%; }
        #anchor-castellano         { top: 75.4%; }
        #anchor-piccolo-cavaliere  { top: 85.0%; }

        /* BOX ATOMICI INDIPENDENTI */
        .inspectable-box {
            width: 100%;
            color: #1c0e00;
            font-family: 'EB Garamond', 'Georgia', serif;
            text-align: center;
            transition: transform 0.05s ease;
            white-space: pre-line;
            word-wrap: break-word;
        }

        .item-name-box {
            font-weight: bold;
            letter-spacing: 0.3px;
            line-height: 1.25em;
        }

        .item-desc-box {
            font-style: italic;
            color: #3d250d;
            line-height: 1.2em;
            margin-top: 2px;
        }

        .item-price-box {
            font-family: 'EB Garamond', serif;
            color: var(--primary-color);
            font-weight: bold;
            line-height: 1.1em;
            margin-top: 1px;
        }

        #debug-tooltip {
            position: fixed;
            z-index: 9999;
            background: rgba(28, 14, 0, 0.95);
            color: #ebdcb9;
            padding: 6px 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            pointer-events: none;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .inspect-highlight {
            outline: 2px dashed #3498db !important;
            background-color: rgba(52, 152, 219, 0.08) !important;
        }
        
        tr.inspect-highlight td {
            background-color: rgba(52, 152, 219, 0.12) !important;
        }

        h2 { color: var(--primary-color); margin-bottom: 15px; font-size: 1.2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 5px;}
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-size: 12px; font-weight: bold; color: var(--primary-color); margin-bottom: 5px; }
        .file-inputs { margin-bottom: 15px; }
        .file-box { background: #fff; border: 1px dashed var(--border-color); padding: 12px; text-align: center; font-size: 13px; cursor: pointer; border-radius: 6px; }
        .file-box.has-image { background: #e8f5e9; border: 1px solid #27ae60; }
        .file-box input { display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; background: white; font-size: 12px; }
        th, td { padding: 10px 8px; border: 1px solid #e0e0e0; text-align: left; vertical-align: top; }
        th { background-color: var(--primary-color); color: white; text-transform: uppercase; font-size: 11px; }
        
        input[type="text"], textarea { width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 6px; font-family: inherit; }
        textarea { resize: vertical; height: 48px; font-size: 12px; }
        
        .typo-controls-block {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 8px;
            background: #f7f2e8;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #eadecc;
        }

        .control-row-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border-bottom: 1px dashed rgba(212, 163, 115, 0.4);
            padding-bottom: 4px;
        }
        .control-row-item:last-child { border-bottom: none; padding-bottom: 0; }

        .control-row-item span.label-target {
            font-size: 11px;
            font-weight: bold;
            color: #444;
            min-width: 60px;
        }

        .micro-controls {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .btn-micro {
            background: #f0e6d2;
            border: 1px solid var(--border-color);
            color: #5c1d1d;
            padding: 2px 5px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            user-select: none;
        }
        .btn-micro:hover { background: #e4d5b7; }
        .lbl-micro-status { font-size: 10px; color: #666; font-family: monospace; min-width: 105px; text-align: right; }

        .btn-container { display: flex; flex-direction: column; gap: 10px; }
        .btn-download { background-color: #27ae60; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; box-shadow: 0 4px 10px rgba(39,174,96,0.2); }
        .btn-reset { background-color: #c0392b; color: white; padding: 6px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; margin-top: 15px; width: 100%; opacity: 0.8; }

        @media (min-width: 769px) and (max-width: 1180px) {
            #main-container { gap: 15px; }
            #preview-workspace { --pc-scale: calc((100vw - 760px) / 560); }
            .page-scale-wrapper { width: calc(560px * var(--pc-scale)); height: calc(685px * var(--pc-scale)); }
            .menu-page-block { transform: scale(var(--pc-scale)); }
        }

        @media (max-width: 768px) {
            body { padding: 15px 10px; }
            #mobile-tabs { display: flex; }
            #main-container { flex-direction: column; align-items: center; gap: 0; width: 100%; }
            #preview-workspace { display: none; width: 100%; }
            #control-panel { max-width: 100%; width: 100%; padding: 15px; display: block; }
            table { font-size: 11px; }
            th, td { padding: 5px; }
            .page-scale-wrapper {
                --mobile-scale: calc((100vw - 20px) / 560); 
                width: calc(100vw - 20px);
                height: calc(685px * var(--mobile-scale)); 
                max-width: 560px;
                max-height: 685px;
            }
            .menu-page-block { transform: scale(calc((100vw - 20px) / 560)); max-width: 560px; }
        }
    </style>
</head>
<body>

    <div id="debug-tooltip"></div>

    <div id="mobile-tabs">
        <button id="btn-tab-edit" class="tab-btn active" onclick="switchMobileTab('edit')">✍️ Modifica Menu</button>
        <button id="btn-tab-view" class="tab-btn" onclick="switchMobileTab('view')">👁️ Vedi Anteprima</button>
    </div>

    <div id="main-container">

        <div id="control-panel">
            <h2>Impostazioni Titolo e Grafica</h2>
            <div class="control-group" data-inspect-name="Input Titolo">
                <label for="input-main-title">Titolo Principale del Menu:</label>
                <input type="text" id="input-main-title" value="Antica Osteria" oninput="updateTitleAndRender()">
            </div>

            <div class="file-inputs" data-inspect-name="Input File Sfondo">
                <div class="file-box" id="box-lbl-bg1">
                    <label for="bg1" id="lbl-bg1">🖼️ Sfondo Predefinito Attivo (menu_bg.png)</label>
                    <input type="file" id="bg1" accept="image/*" onchange="processAndSaveBg(this, 'page-menu', 'db_single_bg', 'box-lbl-bg1')">
                </div>
            </div>

            <h2>Gestione Piatti (Controllo Spaziale 2D Totale)</h2>
            <table id="editor-table">
                <thead>
                    <tr>
                        <th style="width: 30px;">Usa</th>
                        <th>Dati Piatto & Regolazioni Spaziali</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <div class="btn-container" data-inspect-name="Pulsante di Esportazione">
                <button class="btn-download" onclick="downloadPageAsPNG('page-menu', 'Menu_Completo.png')">📸 Scarica Menu Completo (PNG)</button>
            </div>
            
            <button class="btn-reset" onclick="resetToDefault()">🔄 Inizializza Tutto a Predefinito</button>
        </div>

        <div id="preview-workspace">
            <div class="page-scale-wrapper">
                <div id="page-menu" class="menu-page-block">
                    
                    <div id="menu-title-container">
                        <div id="menu-title-target" class="main-menu-title">Antica Osteria</div>
                    </div>

                    <div id="anchor-mastro-birraio" class="menu-overlay-container"></div>
                    <div id="anchor-condottiero" class="menu-overlay-container"></div>
                    <div id="anchor-viandante" class="menu-overlay-container"></div>
                    <div id="anchor-castellano" class="menu-overlay-container"></div>
                    <div id="anchor-piccolo-cavaliere" class="menu-overlay-container"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const DEFAULT_BG_PATH = "menu_bg.png"; 
        const DB_KEY = "db_menu_medievale_v4_2d"; // Database evoluto con supporto vettoriale 2D e controllo prezzo

        const defaultDataset = [
            { id: 1, active: true, cat: "mastro-birraio", catName: "Mastro Birraio", name: "Birra del Borgo", price: "6.00", desc: "Artigianale rossa prodotta con\ngrani locali e luppoli selvatici.", nameFontDelta: 0, nameOffsetTop: 0, nameOffsetLeft: 0, descFontDelta: 0, descOffsetTop: 0, descOffsetLeft: 0, priceFontDelta: 0, priceOffsetTop: 0, priceOffsetLeft: 0 },
            { id: 2, active: true, cat: "condottiero", catName: "Condottiero", name: "Pappardelle al Cinghiale", price: "14.00", desc: "Pasta fresca all'uovo con\nragù bianco di cinghiale locale.", nameFontDelta: 0, nameOffsetTop: 0, nameOffsetLeft: 0, descFontDelta: 0, descOffsetTop: 0, descOffsetLeft: 0, priceFontDelta: 0, priceOffsetTop: 0, priceOffsetLeft: 0 },
            { id: 3, active: true, cat: "viandante", catName: "Viandante", name: "Zuppa di Farro e Castagne", price: "9.00", desc: "Antica ricetta medievale con\nlegumi, farro e castagne.", nameFontDelta: 0, nameOffsetTop: 0, nameOffsetLeft: 0, descFontDelta: 0, descOffsetTop: 0, descOffsetLeft: 0, priceFontDelta: 0, priceOffsetTop: 0, priceOffsetLeft: 0 },
            { id: 4, active: true, cat: "castellano", catName: "Castellano", name: "Ravioli ai Funghi Porcini", price: "16.00", desc: "Pasta ripiena saltata con porcini\ne scaglie di pecorino.", nameFontDelta: 0, nameOffsetTop: 0, nameOffsetLeft: 0, descFontDelta: 0, descOffsetTop: 0, descOffsetLeft: 0, priceFontDelta: 0, priceOffsetTop: 0, priceOffsetLeft: 0 },
            { id: 5, active: true, cat: "piccolo-cavaliere", catName: "Piccolo Cavaliere", name: "Gnocchetti al Pomodoro", price: "7.00", desc: "Porzione ridotta con passata\ndi pomodoro dolce e parmigiano.", nameFontDelta: 0, nameOffsetTop: 0, nameOffsetLeft: 0, descFontDelta: 0, descOffsetTop: 0, descOffsetLeft: 0, priceFontDelta: 0, priceOffsetTop: 0, priceOffsetLeft: 0 }
        ];

        let menuDataset = [];

        function switchMobileTab(targetTab) {
            const panel = document.getElementById('control-panel');
            const preview = document.getElementById('preview-workspace');
            const btnEdit = document.getElementById('btn-tab-edit');
            const btnView = document.getElementById('btn-tab-view');

            if (targetTab === 'edit') {
                panel.style.display = 'block';
                preview.style.display = 'none';
                btnEdit.classList.add('active');
                btnView.classList.remove('active');
            } else {
                panel.style.display = 'none';
                preview.style.display = 'flex';
                btnEdit.classList.remove('active');
                btnView.classList.add('active');
            }
        }

        function initDatabase() {
            const savedData = localStorage.getItem(DB_KEY);
            if (savedData) {
                try {
                    menuDataset = JSON.parse(savedData);
                    menuDataset.forEach(item => {
                        if (item.nameFontDelta === undefined) item.nameFontDelta = 0;
                        if (item.nameOffsetTop === undefined) item.nameOffsetTop = 0;
                        if (item.nameOffsetLeft === undefined) item.nameOffsetLeft = 0;
                        
                        if (item.descFontDelta === undefined) item.descFontDelta = 0;
                        if (item.descOffsetTop === undefined) item.descOffsetTop = 0;
                        if (item.descOffsetLeft === undefined) item.descOffsetLeft = 0;

                        if (item.priceFontDelta === undefined) item.priceFontDelta = 0;
                        if (item.priceOffsetTop === undefined) item.priceOffsetTop = 0;
                        if (item.priceOffsetLeft === undefined) item.priceOffsetLeft = 0;
                    });
                } catch(e) {
                    menuDataset = JSON.parse(JSON.stringify(defaultDataset));
                }
            } else {
                menuDataset = JSON.parse(JSON.stringify(defaultDataset));
                localStorage.setItem(DB_KEY, JSON.stringify(menuDataset));
            }

            const savedTitle = localStorage.getItem('db_menu_main_title_v4');
            if(savedTitle) {
                document.getElementById('input-main-title').value = savedTitle;
            }
        }

        function loadBackground() {
            const savedBg = localStorage.getItem('db_single_bg');
            const menuElement = document.getElementById('page-menu');
            if (savedBg) {
                menuElement.style.backgroundImage = `url('${savedBg}')`;
                setLabelUploaded();
            } else {
                menuElement.style.backgroundImage = `url('${DEFAULT_BG_PATH}')`;
            }
        }

        function setLabelUploaded() {
            const box = document.getElementById('box-lbl-bg1');
            if (box) {
                box.classList.add('has-image');
                box.querySelector('label').innerText = "✅ Sfondo Personalizzato Attivo";
            }
        }

        function processAndSaveBg(input, targetId, storageKey, labelBoxId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Data = e.target.result;
                    try {
                        localStorage.setItem(storageKey, base64Data);
                        document.getElementById(targetId).style.backgroundImage = `url('${base64Data}')`;
                        setLabelUploaded();
                    } catch (error) {
                        alert("LocalStorage pieno, rendering temporaneo applicato.");
                        document.getElementById(targetId).style.backgroundImage = `url('${base64Data}')`;
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function buildEditorTable() {
            const tbody = document.querySelector("#editor-table tbody");
            tbody.innerHTML = menuDataset.map(item => `
                <tr id="editor-row-${item.id}" data-target-group="anchor-${item.cat}">
                    <td style="text-align:center; vertical-align: middle;">
                        <input type="checkbox" ${item.active ? 'checked' : ''} id="active-${item.id}" onchange="syncDataAndRender()">
                    </td>
                    <td>
                        <b style="color:var(--primary-color); font-size:10px; display:block; margin-bottom: 2px;">MENU DEL ${item.catName.toUpperCase()}</b>
                        
                        <div style="display: flex; gap: 8px; margin-bottom: 4px;">
                            <textarea id="name-${item.id}" oninput="syncDataAndRender()" style="flex: 2; font-weight:bold; height:36px;" placeholder="Nome piatto...">${item.name}</textarea>
                            <input type="text" id="price-${item.id}" value="${item.price}" oninput="syncDataAndRender()" style="flex: 0 0 75px; text-align:right; font-weight:bold; height:36px;" placeholder="Prezzo...">
                        </div>
                        
                        <textarea id="desc-${item.id}" oninput="syncDataAndRender()" placeholder="Descrizione piatto...">${item.desc}</textarea>
                        
                        <div class="typo-controls-block">
                            <div class="control-row-item" data-subbox-target="box-${item.cat}-name">
                                <span class="label-target">Box Nome:</span>
                                <div class="micro-controls">
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'name', 'font', -0.5)">A-</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'name', 'font', 0.5)">A+</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'name', 'X', -2)">←</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'name', 'X', 2)">→</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'name', 'Y', -1)">↑</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'name', 'Y', 1)">↓</button>
                                </div>
                                <span id="status-name-${item.id}" class="lbl-micro-status">${item.nameFontDelta >= 0 ? '+' : ''}${item.nameFontDelta}pt | X:${item.nameOffsetLeft}px Y:${item.nameOffsetTop}px</span>
                            </div>
                            
                            <div class="control-row-item" data-subbox-target="box-${item.cat}-price">
                                <span class="label-target">Box Prezzo:</span>
                                <div class="micro-controls">
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'price', 'font', -0.5)">A-</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'price', 'font', 0.5)">A+</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'price', 'X', -2)">←</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'price', 'X', 2)">→</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'price', 'Y', -1)">↑</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'price', 'Y', 1)">↓</button>
                                </div>
                                <span id="status-price-${item.id}" class="lbl-micro-status">${item.priceFontDelta >= 0 ? '+' : ''}${item.priceFontDelta}pt | X:${item.priceOffsetLeft}px Y:${item.priceOffsetTop}px</span>
                            </div>

                            <div class="control-row-item" data-subbox-target="box-${item.cat}-desc">
                                <span class="label-target">Box Desc:</span>
                                <div class="micro-controls">
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'desc', 'font', -0.5)">A-</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'desc', 'font', 0.5)">A+</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'desc', 'X', -2)">←</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'desc', 'X', 2)">→</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'desc', 'Y', -1)">↑</button>
                                    <button class="btn-micro" onclick="adjustVectorTypography(${item.id}, 'desc', 'Y', 1)">↓</button>
                                </div>
                                <span id="status-desc-${item.id}" class="lbl-micro-status">${item.descFontDelta >= 0 ? '+' : ''}${item.descFontDelta}pt | X:${item.descOffsetLeft}px Y:${item.descOffsetTop}px</span>
                            </div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // MOTORE DI TRASLAZIONE VETTORIALE 2D BILANCIATO
        function adjustVectorTypography(id, targetBox, axis, amount) {
            const item = menuDataset.find(x => x.id === id);
            if (!item) return;

            if (targetBox === 'name') {
                if (axis === 'font') item.nameFontDelta = parseFloat((item.nameFontDelta + amount).toFixed(1));
                else if (axis === 'X') item.nameOffsetLeft = parseInt(item.nameOffsetLeft + amount);
                else if (axis === 'Y') item.nameOffsetTop = parseInt(item.nameOffsetTop + amount);
                document.getElementById(`status-name-${id}`).innerText = `${item.nameFontDelta >= 0 ? '+' : ''}${item.nameFontDelta}pt | X:${item.nameOffsetLeft}px Y:${item.nameOffsetTop}px`;
            } else if (targetBox === 'desc') {
                if (axis === 'font') item.descFontDelta = parseFloat((item.descFontDelta + amount).toFixed(1));
                else if (axis === 'X') item.descOffsetLeft = parseInt(item.descOffsetLeft + amount);
                else if (axis === 'Y') item.descOffsetTop = parseInt(item.descOffsetTop + amount);
                document.getElementById(`status-desc-${id}`).innerText = `${item.descFontDelta >= 0 ? '+' : ''}${item.descFontDelta}pt | X:${item.descOffsetLeft}px Y:${item.descOffsetTop}px`;
            } else if (targetBox === 'price') {
                if (axis === 'font') item.priceFontDelta = parseFloat((item.priceFontDelta + amount).toFixed(1));
                else if (axis === 'X') item.priceOffsetLeft = parseInt(item.priceOffsetLeft + amount);
                else if (axis === 'Y') item.priceOffsetTop = parseInt(item.priceOffsetTop + amount);
                document.getElementById(`status-price-${id}`).innerText = `${item.priceFontDelta >= 0 ? '+' : ''}${item.priceFontDelta}pt | X:${item.priceOffsetLeft}px Y:${item.priceOffsetTop}px`;
            }

            localStorage.setItem(DB_KEY, JSON.stringify(menuDataset));
            renderGraphics();
        }

        function updateTitleAndRender() {
            const titleVal = document.getElementById('input-main-title').value;
            localStorage.setItem('db_menu_main_title_v4', titleVal);
            renderGraphics();
        }

        function syncDataAndRender() {
            menuDataset.forEach(item => {
                item.name = document.getElementById(`name-${item.id}`).value;
                item.price = document.getElementById(`price-${item.id}`).value;
                item.desc = document.getElementById(`desc-${item.id}`).value;
                item.active = document.getElementById(`active-${item.id}`).checked;
            });
            
            localStorage.setItem(DB_KEY, JSON.stringify(menuDataset));
            renderGraphics();
        }

        function calculateAutoscalingFont(text, maxChars = 70, baseFont = 11.5) {
            const length = text.length;
            if (length <= 40) return baseFont;
            const scaleFactor = (maxChars - (length - 40)) / maxChars;
            return Math.max(8.0, baseFont * scaleFactor);
        }

        // GENERATORE DEI 3 TRAGUARDI INIETTATI SULLA PERGAMENA
        function renderGraphics() {
            const currentTitle = document.getElementById('input-main-title').value;
            document.getElementById('menu-title-target').innerText = currentTitle;

            const categories = ['mastro-birraio', 'condottiero', 'viandante', 'castellano', 'piccolo-cavaliere'];
            categories.forEach(c => {
                const anchor = document.getElementById(`anchor-${c}`);
                if (anchor) anchor.innerHTML = '';
            });

            menuDataset.forEach(item => {
                if (item.active) {
                    const anchor = document.getElementById(`anchor-${item.cat}`);
                    if (anchor) {
                        // 1. Box Nome Separato
                        const nameBox = document.createElement('div');
                        nameBox.id = `box-${item.cat}-name`;
                        nameBox.className = 'inspectable-box item-name-box';
                        nameBox.style.fontSize = `${13.5 + item.nameFontDelta}px`;
                        nameBox.style.transform = `translate(${item.nameOffsetLeft}px, ${item.nameOffsetTop}px)`;
                        nameBox.textContent = item.name;
                        
                        // 2. Box Prezzo Separato
                        const priceBox = document.createElement('div');
                        priceBox.id = `box-${item.cat}-price`;
                        priceBox.className = 'inspectable-box item-price-box';
                        priceBox.style.fontSize = `${12.5 + item.priceFontDelta}px`;
                        priceBox.style.transform = `translate(${item.priceOffsetLeft}px, ${item.priceOffsetTop}px)`;
                        priceBox.textContent = item.price ? `€ ${item.price}` : '';

                        // 3. Box Descrizione Separata
                        const descBox = document.createElement('div');
                        descBox.id = `box-${item.cat}-desc`;
                        descBox.className = 'inspectable-box item-desc-box';
                        const finalDescSize = calculateAutoscalingFont(item.desc, 70, 11.5) + item.descFontDelta;
                        descBox.style.fontSize = `${finalDescSize}px`;
                        descBox.style.transform = `translate(${item.descOffsetLeft}px, ${item.descOffsetTop}px)`;
                        descBox.textContent = item.desc; 

                        // Iniezione ordinata dei tre box atomici
                        anchor.appendChild(nameBox);
                        anchor.appendChild(priceBox);
                        anchor.appendChild(descBox);
                    }
                }
            });
        }

        function downloadPageAsPNG(elementId, filename) {
            document.querySelectorAll('.inspect-highlight').forEach(el => el.classList.remove('inspect-highlight'));
            document.getElementById('debug-tooltip').style.display = 'none';

            const preview = document.getElementById('preview-workspace');
            const originalDisplay = window.getComputedStyle(preview).display;
            if (originalDisplay === 'none') preview.style.display = 'flex';

            const element = document.getElementById(elementId);
            html2canvas(element, {
                scale: 3,
                useCORS: true,       
                allowTaint: false,   
                logging: false,
                imageTimeout: 0
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = filename;
                link.href = canvas.toDataURL('image/png');
                link.click();
                if (originalDisplay === 'none') preview.style.display = 'none';
            }).catch(err => {
                alert("Errore esportazione: " + err);
                if (originalDisplay === 'none') preview.style.display = 'none';
            });
        }

        function resetToDefault() {
            if (confirm("Attenzione! Questo cancellerà tutti i testi inseriti e le posizioni 2D dei tre Box. Vuoi procedere?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        // ==========================================================================
        // ISPEZIONE COORDINATA BI-DIREZIONALE COMPLETA (3 LIVELLI ATOMICI)
        // ==========================================================================
        const workspace = document.getElementById('preview-workspace');
        const controlPanel = document.getElementById('control-panel');
        const tooltip = document.getElementById('debug-tooltip');
        
        let activeElementsRegistry = [];

        function moveAndShowTooltip(e, label) {
            tooltip.style.display = 'block';
            tooltip.innerText = label;
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
        }

        function clearAllHighlights() {
            tooltip.style.display = 'none';
            activeElementsRegistry.forEach(el => { if (el) el.classList.remove('inspect-highlight'); });
            activeElementsRegistry = [];
        }

        workspace.addEventListener('mousemove', (e) => {
            clearAllHighlights();
            const hitElement = e.target;
            const targetNode = hitElement.closest('.item-name-box, .item-desc-box, .item-price-box, #menu-title-container, .menu-page-block');
            
            if (targetNode) {
                targetNode.classList.add('inspect-highlight');
                activeElementsRegistry.push(targetNode);

                if (targetNode.id) {
                    const idString = targetNode.id;
                    moveAndShowTooltip(e, `Anteprima -> #${idString}`);
                    
                    const match = idString.match(/box-(.+)-(name|desc|price)/);
                    if (match) {
                        const cat = match[1];
                        const row = controlPanel.querySelector(`tr[data-target-group="anchor-${cat}"]`);
                        if (row) {
                            row.classList.add('inspect-highlight');
                            activeElementsRegistry.push(row);
                        }
                        const rowControl = controlPanel.querySelector(`[data-subbox-target="${idString}"]`);
                        if (rowControl) {
                            rowControl.classList.add('inspect-highlight');
                            activeElementsRegistry.push(rowControl);
                        }
                    }
                } else {
                    moveAndShowTooltip(e, `Anteprima -> Sfondo Pergamena`);
                }
            }
        });

        workspace.addEventListener('mouseleave', clearAllHighlights);

        controlPanel.addEventListener('mousemove', (e) => {
            const hitElement = e.target;
            const subControlRow = hitElement.closest('[data-subbox-target]');
            const mainTableRow = hitElement.closest('#editor-table tbody tr');
            const groupTarget = hitElement.closest('.control-group, .file-inputs');

            if (subControlRow) {
                clearAllHighlights();
                subControlRow.classList.add('inspect-highlight');
                activeElementsRegistry.push(subControlRow);

                const targetBoxId = subControlRow.getAttribute('data-subbox-target');
                const visualBox = document.getElementById(targetBoxId);
                if (visualBox) {
                    visualBox.classList.add('inspect-highlight');
                    activeElementsRegistry.push(visualBox);
                }
                moveAndShowTooltip(e, `Editor -> #${targetBoxId}`);
            } 
            else if (mainTableRow && !subControlRow) {
                clearAllHighlights();
                mainTableRow.classList.add('inspect-highlight');
                activeElementsRegistry.push(mainTableRow);
                
                const anchorId = mainTableRow.getAttribute('data-target-group');
                const anchorEl = document.getElementById(anchorId);
                if (anchorEl) {
                    Array.from(anchorEl.children).forEach(child => {
                        child.classList.add('inspect-highlight');
                        activeElementsRegistry.push(child);
                    });
                }
                moveAndShowTooltip(e, `Editor Gruppo -> #${anchorId}`);
            }
            else if (groupTarget) {
                clearAllHighlights();
                groupTarget.classList.add('inspect-highlight');
                activeElementsRegistry.push(groupTarget);

                const name = groupTarget.getAttribute('data-inspect-name') || "Controllo Grafico";
                if(groupTarget.querySelector('#input-main-title')) {
                    const titleBox = document.getElementById('menu-title-container');
                    if(titleBox) {
                        titleBox.classList.add('inspect-highlight');
                        activeElementsRegistry.push(titleBox);
                    }
                }
                moveAndShowTooltip(e, `Pannello -> ${name}`);
            } else {
                if(!hitElement.closest('input, textarea, button, td, label')) {
                    clearAllHighlights();
                }
            }
        });

        controlPanel.addEventListener('mouseleave', clearAllHighlights);

        // Bootstrap App
        initDatabase();
        buildEditorTable();
        loadBackground();
        renderGraphics();
    </script>
</body>
</html>
