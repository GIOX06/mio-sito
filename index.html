<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuratore Menu Medievale - Ispezione Strutturale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #5c1d1d;
            --bg-panel: #fdfbf7;
            --border-color: #d4a373;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #ebdcb9;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #mobile-tabs {
            display: none;
            width: 100%;
            max-width: 560px;
            margin-bottom: 15px;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid var(--primary-color);
            background-color: transparent;
            color: var(--primary-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        #main-container {
            display: flex;
            flex-direction: row; 
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            align-items: flex-start;
            justify-content: center;
        }

        #control-panel {
            flex: 1;
            max-width: 580px;
            background: var(--bg-panel);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            height: fit-content;
        }

        #preview-workspace {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            position: relative; /* Necessario per il posizionamento assoluto del tooltip di debug */
        }

        .page-scale-wrapper {
            width: 560px;
            height: 685px;
            flex-shrink: 0;
        }

        .menu-page-block {
            width: 560px;
            height: 685px;
            position: relative;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            transform-origin: top left;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .placeholder-text {
            position: absolute; top:50%; left:50%; transform:translate(-50%, -50%);
            color: #aaa; font-style: italic; font-size: 14px; pointer-events: none;
            font-family: 'Segoe UI', sans-serif;
            display: none;
        }

        #menu-title-container {
            position: absolute;
            top: 28%;
            left: 20%;
            width: 60%;
            text-align: center;
            font-family: 'EB Garamond', 'Georgia', serif;
            color: #1c0e00;
        }

        .main-menu-title {
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(92, 29, 29, 0.3);
            padding-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .menu-overlay {
            position: absolute;
            left: 20%;
            width: 60%;
            color: #1c0e00;
            font-family: 'EB Garamond', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 2px;
            transition: transform 0.1s ease;
        }

        #box-mastro-birraio     { top: 41.7%; }
        #box-condottiero        { top: 54.7%; }
        #box-viandante          { top: 65.3%; }
        #box-castellano         { top: 75.4%; }
        #box-piccolo-cavaliere  { top: 85.0%; }

        .item-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .item-header {
            font-weight: bold;
            color: #1c0e00;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .item-price-span {
            color: var(--primary-color);
            margin-left: 5px;
        }

        .item-desc {
            display: block;
            width: 100%;
            font-style: italic;
            color: #3d250d;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
        }

        /* STILIZZAZIONE DEL DIAGNOSTIC TOOLTIP */
        #debug-tooltip {
            position: fixed;
            z-index: 9999;
            background: rgba(28, 14, 0, 0.95);
            color: #ebdcb9;
            padding: 6px 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            pointer-events: none; /* Impedisce al tooltip di bloccare gli eventi mouseover sottostanti */
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* HIGHLIGHT VISIVO SULL'OGGETTO ISPEZIONATO SULLA PERGAMENA */
        .inspect-highlight {
            outline: 2px dashed #3498db !important;
            background-color: rgba(52, 152, 219, 0.08) !important;
        }

        h2 { color: var(--primary-color); margin-bottom: 15px; font-size: 1.3rem; border-bottom: 2px solid var(--border-color); padding-bottom: 5px;}
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-size: 12px; font-weight: bold; color: var(--primary-color); margin-bottom: 5px; }
        .file-inputs { margin-bottom: 15px; }
        .file-box { background: #fff; border: 1px dashed var(--border-color); padding: 12px; text-align: center; font-size: 13px; cursor: pointer; border-radius: 6px; }
        .file-box.has-image { background: #e8f5e9; border: 1px solid #27ae60; }
        .file-box input { display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; background: white; font-size: 12px; }
        th, td { padding: 8px; border: 1px solid #e0e0e0; text-align: left; vertical-align: top; }
        th { background-color: var(--primary-color); color: white; text-transform: uppercase; font-size: 11px; }
        
        input[type="text"], textarea { width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 6px; font-family: inherit; }
        textarea { resize: vertical; height: 42px; font-size: 11px; }
        
        .micro-controls {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            align-items: center;
        }
        .btn-micro {
            background: #f0e6d2;
            border: 1px solid var(--border-color);
            color: #5c1d1d;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            user-select: none;
        }
        .btn-micro:hover { background: #e4d5b7; }
        .lbl-micro-status { font-size: 10px; color: #666; font-family: monospace; }

        .btn-container { display: flex; flex-direction: column; gap: 10px; }
        .btn-download { background-color: #27ae60; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; box-shadow: 0 4px 10px rgba(39,174,96,0.2); }
        .btn-reset { background-color: #c0392b; color: white; padding: 6px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; margin-top: 15px; width: 100%; opacity: 0.8; }

        @media (min-width: 769px) and (max-width: 1180px) {
            #main-container { gap: 20px; }
            #preview-workspace { --pc-scale: calc((100vw - 620px) / 560); }
            .page-scale-wrapper { width: calc(560px * var(--pc-scale)); height: calc(685px * var(--pc-scale)); }
            .menu-page-block { transform: scale(var(--pc-scale)); }
        }

        @media (max-width: 768px) {
            body { padding: 15px 10px; }
            #mobile-tabs { display: flex; }
            #main-container { flex-direction: column; align-items: center; gap: 0; width: 100%; }
            #preview-workspace { display: none; width: 100%; }
            #control-panel { max-width: 100%; width: 100%; padding: 15px; display: block; }
            table { font-size: 11px; }
            th, td { padding: 5px; }
            .page-scale-wrapper {
                --mobile-scale: calc((100vw - 20px) / 560); 
                width: calc(100vw - 20px);
                height: calc(685px * var(--mobile-scale)); 
                max-width: 560px;
                max-height: 685px;
            }
            .menu-page-block { transform: scale(calc((100vw - 20px) / 560)); max-width: 560px; }
        }
    </style>
</head>
<body>

    <!-- TOOLTIP DINAMICO PER ISPEZIONE OGGETTI -->
    <div id="debug-tooltip"></div>

    <div id="mobile-tabs">
        <button id="btn-tab-edit" class="tab-btn active" onclick="switchMobileTab('edit')">✍️ Modifica Menu</button>
        <button id="btn-tab-view" class="tab-btn" onclick="switchMobileTab('view')">👁️ Vedi Anteprima</button>
    </div>

    <div id="main-container">

        <div id="control-panel">
            <h2>Impostazioni Titolo e Grafica</h2>
            <div class="control-group">
                <label for="input-main-title">Titolo Principale del Menu:</label>
                <input type="text" id="input-main-title" value="Antica Osteria" oninput="updateTitleAndRender()">
            </div>

            <div class="file-inputs">
                <div class="file-box" id="box-lbl-bg1">
                    <label for="bg1" id="lbl-bg1">🖼️ Sovrascrivi Sfondo (Opzionale)</label>
                    <input type="file" id="bg1" accept="image/*" onchange="processAndSaveBg(this, 'page-menu', 'db_single_bg', 'box-lbl-bg1') border-color">
                </div>
            </div>

            <h2>Gestione Piatti, Prezzi e Grafica Linee</h2>
            <table id="editor-table">
                <thead>
                    <tr>
                        <th style="width: 30px;">Usa</th>
                        <th>Dati Piatto & Regolazioni Spaziali</th>
                        <th style="width: 65px;">Prezzo</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <div class="btn-container">
                <button class="btn-download" onclick="downloadPageAsPNG('page-menu', 'Menu_Completo.png')">📸 Scarica Menu Completo (PNG)</button>
            </div>
            
            <button class="btn-reset" onclick="resetToDefault()">🔄 Inizializza Tutto a Predefinito</button>
        </div>

        <div id="preview-workspace">
            <div class="page-scale-wrapper">
                <div id="page-menu" class="menu-page-block">
                    <div id="p1-placeholder" class="placeholder-text">Caricamento sfondo...</div>
                    
                    <div id="menu-title-container">
                        <div id="menu-title-target" class="main-menu-title">Antica Osteria</div>
                    </div>

                    <div id="box-mastro-birraio" class="menu-overlay"></div>
                    <div id="box-condottiero" class="menu-overlay"></div>
                    <div id="box-viandante" class="menu-overlay"></div>
                    <div id="box-castellano" class="menu-overlay"></div>
                    <div id="box-piccolo-cavaliere" class="menu-overlay"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const DEFAULT_BG_PATH = "menu_bg.jpg"; 

        const defaultDataset = [
            { id: 1, active: true, cat: "mastro-birraio", catName: "Mastro Birraio", name: "Birra del Borgo", price: "6.00", desc: "Artigianale rossa prodotta con grani locali e luppoli selvatici.", fontDelta: 0, offsetTop: 0 },
            { id: 2, active: true, cat: "condottiero", catName: "Condottiero", name: "Pappardelle al Cinghiale", price: "14.00", desc: "Pasta fresca all'uovo con ragù bianco di cinghiale locale.", fontDelta: 0, offsetTop: 0 },
            { id: 3, active: true, cat: "viandante", catName: "Viandante", name: "Zuppa di Farro e Castagne", price: "9.00", desc: "Antica ricetta medievale con legumi, farro e castagne.", fontDelta: 0, offsetTop: 0 },
            { id: 4, active: true, cat: "castellano", catName: "Castellano", name: "Ravioli ai Funghi Porcini", price: "16.00", desc: "Pasta ripiena saltata con porcini e scaglie di pecorino.", fontDelta: 0, offsetTop: 0 },
            { id: 5, active: true, cat: "piccolo-cavaliere", catName: "Piccolo Cavaliere", name: "Gnocchetti al Pomodoro", price: "7.00", desc: "Porzione ridotta con passata di pomodoro dolce e parmigiano.", fontDelta: 0, offsetTop: 0 }
        ];

        let menuDataset = [];

        function switchMobileTab(targetTab) {
            const panel = document.getElementById('control-panel');
            const preview = document.getElementById('preview-workspace');
            const btnEdit = document.getElementById('btn-tab-edit');
            const btnView = document.getElementById('btn-tab-view');

            if (targetTab === 'edit') {
                panel.style.display = 'block';
                preview.style.display = 'none';
                btnEdit.classList.add('active');
                btnView.classList.remove('active');
            } else {
                panel.style.display = 'none';
                preview.style.display = 'flex';
                btnEdit.classList.remove('active');
                btnView.classList.add('active');
            }
        }

        function initDatabase() {
            const savedData = localStorage.getItem('db_menu_medievale_single');
            if (savedData) {
                menuDataset = JSON.parse(savedData);
                menuDataset.forEach(item => {
                    if (item.fontDelta === undefined) item.fontDelta = 0;
                    if (item.offsetTop === undefined) item.offsetTop = 0;
                });
            } else {
                menuDataset = JSON.parse(JSON.stringify(defaultDataset));
                localStorage.setItem('db_menu_medievale_single', JSON.stringify(menuDataset));
            }

            const savedTitle = localStorage.getItem('db_menu_main_title');
            if(savedTitle) {
                document.getElementById('input-main-title').value = savedTitle;
            }
        }

        function loadBackground() {
            const savedBg = localStorage.getItem('db_single_bg');
            const menuElement = document.getElementById('page-menu');
            if (savedBg) {
                menuElement.style.backgroundImage = `url('${savedBg}')`;
                setLabelUploaded();
            } else {
                menuElement.style.backgroundImage = `url('${DEFAULT_BG_PATH}')`;
            }
        }

        function setLabelUploaded() {
            const box = document.getElementById('box-lbl-bg1');
            if (box) {
                box.classList.add('has-image');
                box.querySelector('label').innerText = "✅ Sfondo Personalizzato Attivo";
            }
        }

        function processAndSaveBg(input, targetId, storageKey, labelBoxId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Data = e.target.result;
                    try {
                        localStorage.setItem(storageKey, base64Data);
                        document.getElementById(targetId).style.backgroundImage = `url('${base64Data}')`;
                        setLabelUploaded();
                    } catch (error) {
                        alert("LocalStorage pieno, visualizzazione solo temporanea.");
                        document.getElementById(targetId).style.backgroundImage = `url('${base64Data}')`;
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function buildEditorTable() {
            const tbody = document.querySelector("#editor-table tbody");
            tbody.innerHTML = menuDataset.map(item => `
                <tr>
                    <td style="text-align:center;">
                        <input type="checkbox" ${item.active ? 'checked' : ''} id="active-${item.id}" onchange="syncDataAndRender()">
                    </td>
                    <td>
                        <b style="color:var(--primary-color); font-size:10px; display:block;">MENU DEL ${item.catName.toUpperCase()}</b>
                        <input type="text" value="${item.name}" id="name-${item.id}" oninput="syncDataAndRender()" style="margin-bottom:4px; font-weight:bold;">
                        <textarea id="desc-${item.id}" oninput="syncDataAndRender()">${item.desc}</textarea>
                        
                        <div class="micro-controls">
                            <span style="font-size:11px; font-weight:bold; margin-right:2px;">Testo:</span>
                            <button class="btn-micro" onclick="adjustTypography(${item.id}, 'font', -0.5)">A-</button>
                            <button class="btn-micro" onclick="adjustTypography(${item.id}, 'font', 0.5)">A+</button>
                            
                            <span style="font-size:11px; font-weight:bold; margin-left:8px; margin-right:2px;">Posizione:</span>
                            <button class="btn-micro" onclick="adjustTypography(${item.id}, 'position', -1)">↑ Su</button>
                            <button class="btn-micro" onclick="adjustTypography(${item.id}, 'position', 1)">↓ Giù</button>
                            
                            <span id="status-${item.id}" class="lbl-micro-status">(${item.fontDelta >= 0 ? '+' : ''}${item.fontDelta}pt / ${item.offsetTop >= 0 ? '+' : ''}${item.offsetTop}px)</span>
                        </div>
                    </td>
                    <td><input type="text" value="${item.price}" id="price-${item.id}" oninput="syncDataAndRender()" style="text-align:right;"></td>
                </tr>
            `).join('');
        }

        function adjustTypography(id, type, amount) {
            const item = menuDataset.find(x => x.id === id);
            if (!item) return;

            if (type === 'font') {
                item.fontDelta = parseFloat((item.fontDelta + amount).toFixed(1));
            } else if (type === 'position') {
                item.offsetTop = parseInt(item.offsetTop + amount);
            }

            const statusLabel = document.getElementById(`status-${id}`);
            if (statusLabel) {
                statusLabel.innerText = `(${item.fontDelta >= 0 ? '+' : ''}${item.fontDelta}pt / ${item.offsetTop >= 0 ? '+' : ''}${item.offsetTop}px)`;
            }

            localStorage.setItem('db_menu_medievale_single', JSON.stringify(menuDataset));
            renderGraphics();
        }

        function updateTitleAndRender() {
            const titleVal = document.getElementById('input-main-title').value;
            localStorage.setItem('db_menu_main_title', titleVal);
            renderGraphics();
        }

        function syncDataAndRender() {
            menuDataset.forEach(item => {
                item.name = document.getElementById(`name-${item.id}`).value;
                item.price = document.getElementById(`price-${item.id}`).value;
                item.desc = document.getElementById(`desc-${item.id}`).value;
                item.active = document.getElementById(`active-${item.id}`).checked;
            });
            
            localStorage.setItem('db_menu_medievale_single', JSON.stringify(menuDataset));
            renderGraphics();
        }

        function calculateAutoscalingFont(text, maxChars = 60, baseFont = 11.5) {
            const length = text.length;
            if (length <= 40) return baseFont;
            const scaleFactor = (maxChars - (length - 40)) / maxChars;
            return Math.max(8.5, baseFont * scaleFactor);
        }

        function renderGraphics() {
            const currentTitle = document.getElementById('input-main-title').value;
            document.getElementById('menu-title-target').innerText = currentTitle;

            const categories = ['mastro-birraio', 'condottiero', 'viandante', 'castellano', 'piccolo-cavaliere'];
            categories.forEach(c => {
                const box = document.getElementById(`box-${c}`);
                box.innerHTML = '';
                box.style.transform = 'none'; 
            });

            menuDataset.forEach(item => {
                if (item.active) {
                    const box = document.getElementById(`box-${item.cat}`);
                    if (box) {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'item-wrapper';

                        const cleanDesc = item.desc.replace(/\n/g, " ").trim();
                        const autoDescSize = calculateAutoscalingFont(cleanDesc, 60, 11.5) + item.fontDelta;
                        const headerFontSize = 13.5 + item.fontDelta;

                        wrapper.innerHTML = `
                            <div class="item-header" style="font-size: ${headerFontSize}px;">
                                ${item.name} <span class="item-price-span">- € ${item.price}</span>
                            </div>
                            <div class="item-desc" style="font-size: ${autoDescSize}px;" title="${cleanDesc}">
                                ${cleanDesc}
                            </div>
                        `;
                        box.appendChild(wrapper);
                        box.style.transform = `translateY(${item.offsetTop}px)`;
                    }
                }
            });
        }

        function downloadPageAsPNG(elementId, filename) {
            // Disattiva temporaneamente l'effetto ispezione visiva per pulire l'output PNG finalizzato
            const activeHighlights = document.querySelectorAll('.inspect-highlight');
            activeHighlights.forEach(el => el.classList.remove('inspect-highlight'));
            document.getElementById('debug-tooltip').style.display = 'none';

            const preview = document.getElementById('preview-workspace');
            const originalDisplay = window.getComputedStyle(preview).display;
            
            if (originalDisplay === 'none') preview.style.display = 'flex';

            const element = document.getElementById(elementId);
            html2canvas(element, {
                scale: 3,
                useCORS: true,       
                allowTaint: false,   
                logging: false,
                imageTimeout: 0
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = filename;
                link.href = canvas.toDataURL('image/png');
                link.click();
                if (originalDisplay === 'none') preview.style.display = 'none';
            }).catch(err => {
                alert("Errore esportazione: " + err);
                if (originalDisplay === 'none') preview.style.display = 'none';
            });
        }

        function resetToDefault() {
            if (confirm("Vuoi azzerare tutte le modifiche, i font personalizzati e gli spostamenti verticali delle linee?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        // ==========================================================================
        // MOTORE DI ISPEZIONE DIAGNOSTICA (TOOLTIP REAL-TIME)
        // ==========================================================================
        const workspace = document.getElementById('preview-workspace');
        const tooltip = document.getElementById('debug-tooltip');
        let lastHighlightedElement = null;

        workspace.addEventListener('mousemove', (e) => {
            // Ottieni l'elemento preciso che si trova sotto il cursore
            const hitElement = e.target;
            
            // Trova il più vicino contenitore logico rilevante all'interno della pergamena
            const targetNode = hitElement.closest('.menu-overlay, #menu-title-container, .menu-page-block');
            
            if (targetNode) {
                // Gestione Highlight Grafico Temporaneo
                if (lastHighlightedElement && lastHighlightedElement !== targetNode) {
                    lastHighlightedElement.classList.remove('inspect-highlight');
                }
                targetNode.classList.add('inspect-highlight');
                lastHighlightedElement = targetNode;

                // Estrazione dati strutturali dell'oggetto puntato
                let identifierText = "";
                if (targetNode.id) {
                    identifierText = `ID: #${targetNode.id}`;
                } else if (targetNode.className) {
                    // Pulisce le classi di debug dall'output testuale del tooltip
                    const cleanClass = targetNode.className.replace('inspect-highlight', '').trim();
                    identifierText = `Classe: .${cleanClass.split(' ').join('.')}`;
                }

                // Aggiornamento posizionamento e visibilità del Tooltip Diagnostic
                tooltip.style.display = 'block';
                tooltip.innerText = identifierText;
                
                // Offset di posizionamento rispetto al puntatore mouse per evitare sfarfallii
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
            } else {
                clearInspectorState();
            }
        });

        // Reset dello stato quando il mouse esce completamente dall'area di anteprima
        workspace.addEventListener('mouseleave', () => {
            clearInspectorState();
        });

        function clearInspectorState() {
            tooltip.style.display = 'none';
            if (lastHighlightedElement) {
                lastHighlightedElement.classList.remove('inspect-highlight');
                lastHighlightedElement = null;
            }
        }

        // Inizializzazione applicativa sequenziale
        initDatabase();
        buildEditorTable();
        loadBackground();
        renderGraphics();
    </script>
</body>
</html>
